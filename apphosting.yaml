runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
  - variable: APPLE_SIGNER_CERT_PEM_BASE64
    secret: APPLE_SIGNER_CERT_PEM_BASE64
  - variable: APPLE_SIGNER_KEY_PEM_BASE64
    secret: APPLE_SIGNER_KEY_PEM_BASE64
  - variable: APPLE_WWDR_PEM_BASE64
    secret: APPLE_WWDR_PEM_BASE64
  - variable: APPLE_TEAM_IDENTIFIER
    secret: APPLE_TEAM_IDENTIFIER
  - variable: APPLE_PASS_CERT_PASSWORD
    secret: APPLE_PASS_CERT_PASSWORD
  - variable: CRON_SECRET
    secret: CRON_SECRET
    # 2026-07-02: Secret Manager側でCRON_SECRET作成・アクセス権付与済み
    # (他の既存シークレット(APPLE_TEAM_IDENTIFIER等)と同一のロール構成に統一:
    #  firebase-app-hosting-compute@ = シークレットアクセサー+閲覧者、
    #  service-...@gcp-sa-firebaseapphosting = シークレットバージョンのマネージャー)
